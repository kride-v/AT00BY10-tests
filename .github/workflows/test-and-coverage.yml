# .github/workflows/test-and-coverage.yml
name: Test & Coverage

# Workflow laukeaa aina push- tai pull request -tapahtumassa
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest  # Käytetään GitHubin Linux runneria

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v5  # kloonaa repo runnerille

      # 2️⃣ Asenna Node.js (käytetään uutta suositeltua versiota)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'  # Node 24 on GitHubin uusin suositeltu

      # 3️⃣ Asenna npm-paketit
      - name: Install dependencies
        run: npm install

      # 4️⃣ Aja Jest-testit ja luo coverage-raportti
      - name: Run tests with coverage
        run: npm test -- --coverage

      # 5️⃣ Lähetä raportti Coverallsille
      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }} # Turvallinen GitHubin sisäinen token
