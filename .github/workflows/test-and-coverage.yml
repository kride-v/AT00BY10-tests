# .github/workflows/test-and-coverage.yml
name: Test & Coverage

# Workflow laukeaa aina push- tai pull request -tapahtumassa
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest  # Käytetään GitHubin Linux runneria
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Pakottaa Node 24 käytön

    steps:
      # 1 Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v5  # kloonaa repo runnerille

      # 2 Asenna Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'

      # 3 Asenna npm-paketit
      - name: Install dependencies
        run: npm install

      # 4 Aja Jest-testit ja luo coverage-raportti
      - name: Run tests with coverage
        run: npm test -- --coverage

      # 5 Lähetä raportti Coverallsille
      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}  # Turvallinen GitHubin sisäinen token
